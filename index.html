<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Student Showcase Platform — a Mada Studio frontend team project."
    />
    <title>Student Showcase Platform | Mada Studio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Build the navigation links and mobile menu here. -->
    <header class="site-header">
      <nav class="container" aria-label="Main navigation">
        <a class="brand" href="index.html">Mada Studio</a>
      </nav>
    </header>

    <main>
      <!-- Add the main project message, call to action, and visual here. -->
      <section id="hero" class="hero">
        <div class="container">
          <p class="eyebrow">Student Showcase Platform</p>
          <h1>Ideas made visible.</h1>
          <p>Use this space to introduce the platform and its purpose.</p>
        </div>
      </section>

      <!-- Display student work as cards or a filterable gallery here. -->
      <section id="projects" class="section">
        <div class="container">
          <h2>Featured Projects</h2>
        </div>
      </section>

      <!-- Explain the platform, studio, or student community here. -->
      <section id="about" class="section section--mint">
        <div class="container">
          <h2>About</h2>
        </div>
      </section>
    </main>

    <!-- Add contact links, social links, and legal text here. -->
    <footer class="site-footer">
      <div class="container">© Mada Studio</div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
